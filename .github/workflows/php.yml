name: PHP Syntax

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  syntax:
    name: "PHP ${{ matrix.php }} Syntax"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ["8.1", "8.2", "8.3"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: "Setup PHP ${{ matrix.php }}"
        uses: shivammathur/setup-php@v2
        with:
          php-version: "${{ matrix.php }}"
          coverage: none

      - name: Check PHP syntax
        run: find src/ database/ config/ routes/ -name "*.php" | xargs php -l -n
